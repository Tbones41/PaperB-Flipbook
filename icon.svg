<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1d6d72"/>
      <stop offset="1" stop-color="#164b4f"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="6" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Paper stack (3 offset pages) -->
  <g filter="url(#softShadow)">
    <rect x="132" y="112" width="248" height="316" rx="20" fill="#f3eee1" transform="rotate(-3 256 270)"/>
    <rect x="132" y="112" width="248" height="316" rx="20" fill="#f9f3e4" transform="rotate(2 256 270)"/>
    <rect x="128" y="108" width="256" height="324" rx="22" fill="#fbf8f1"/>
  </g>

  <!-- Content lines on top page -->
  <g fill="#1d6d72" opacity="0.9">
    <rect x="158" y="148" width="116" height="22" rx="5"/>
  </g>
  <g fill="#5c3d7a" opacity="0.8">
    <rect x="158" y="182" width="196" height="8" rx="3"/>
    <rect x="158" y="198" width="162" height="8" rx="3"/>
  </g>
  <!-- Task rows -->
  <g>
    <circle cx="168" cy="246" r="10" fill="none" stroke="#1d6d72" stroke-width="3"/>
    <rect x="188" y="238" width="168" height="8" rx="3" fill="#1d6d72" opacity="0.5"/>
    <rect x="188" y="254" width="142" height="6" rx="2" fill="#524a43" opacity="0.4"/>

    <circle cx="168" cy="302" r="10" fill="none" stroke="#b8842a" stroke-width="3"/>
    <rect x="188" y="294" width="168" height="8" rx="3" fill="#b8842a" opacity="0.55"/>
    <rect x="188" y="310" width="128" height="6" rx="2" fill="#524a43" opacity="0.4"/>

    <circle cx="168" cy="358" r="10" fill="#5c3d7a"/>
    <path d="M163 358 l4 4 l7 -8" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="188" y="350" width="168" height="8" rx="3" fill="#5c3d7a" opacity="0.55"/>
    <rect x="188" y="366" width="154" height="6" rx="2" fill="#524a43" opacity="0.3"/>
  </g>

  <!-- Day counter -->
  <text x="256" y="416" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="14" font-weight="600" fill="#8a7f73" letter-spacing="2">DAY 1 OF 168</text>
</svg>
