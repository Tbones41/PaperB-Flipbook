<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#1d5259">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Paper B">
<title>MRCPsych Paper B · Daily Sheets</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --p1:#1d6d72;--p2:#5c3d7a;--p3:#b8842a;--p4:#9e3f4f;--p5:#2c3e50;
  --bg:#f5f2ed;--card:#ffffff;--text:#1e1b18;--muted:#888;--border:#e0d8cc;
  --bar:52px;
}
[data-dark]{--bg:#111;--card:#1a1815;--text:#f0ede8;--muted:#999;--border:#2a2520;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  -webkit-font-smoothing:antialiased;}

/* ── Bar ── */
.bar{position:fixed;top:0;left:0;right:0;z-index:200;height:var(–bar);
display:flex;align-items:center;padding:0 8px;gap:4px;
background:rgba(245,242,237,.95);backdrop-filter:blur(12px);
-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(–border);}
[data-dark] .bar{background:rgba(17,17,17,.95);}
.bar-btn{width:42px;height:42px;border:none;background:none;cursor:pointer;
display:flex;align-items:center;justify-content:center;
color:var(–text);border-radius:10px;flex-shrink:0;}
.bar-btn:active{background:rgba(0,0,0,.08);}
.bar-center{flex:1;text-align:center;min-width:0;overflow:hidden;}
.bar-title{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bar-sub{font-size:10.5px;color:var(–muted);font-family:‘Courier New’,monospace;margin-top:1px;}

/* ── Progress ── */
.prog{position:fixed;top:var(–bar);left:0;right:0;z-index:199;height:3px;background:var(–border);}
.prog-fill{height:100%;background:var(–p1);transition:width .5s ease;width:0;}

/* ── Stage: stretch so card fills full height ── */
.stage{
position:fixed;
top:calc(var(–bar) + 3px);
bottom:36px;
left:0;right:0;
display:flex;
align-items:stretch;
justify-content:center;
overflow:hidden;
padding:10px 8px;
}

/* ── Card fills the stage ── */
.card{
width:100%;max-width:460px;
flex:1;
background:var(–card);border-radius:14px;
box-shadow:0 8px 40px rgba(0,0,0,.15),0 2px 8px rgba(0,0,0,.08);
overflow:hidden;position:relative;
display:flex;flex-direction:column;
will-change:transform,opacity;
}
[data-dark] .card{box-shadow:0 8px 40px rgba(0,0,0,.6);}

/* Flip animations — perspective on element, no preserve-3d needed */
@keyframes flip-out{
0%  {transform:perspective(900px) rotateY(0deg);opacity:1;}
100%{transform:perspective(900px) rotateY(-90deg);opacity:.2;}
}
@keyframes flip-in{
0%  {transform:perspective(900px) rotateY(90deg);opacity:.2;}
100%{transform:perspective(900px) rotateY(0deg);opacity:1;}
}
@keyframes flip-out-rev{
0%  {transform:perspective(900px) rotateY(0deg);opacity:1;}
100%{transform:perspective(900px) rotateY(90deg);opacity:.2;}
}
@keyframes flip-in-rev{
0%  {transform:perspective(900px) rotateY(-90deg);opacity:.2;}
100%{transform:perspective(900px) rotateY(0deg);opacity:1;}
}
.card.out-fwd{animation:flip-out 180ms ease-in forwards;}
.card.in-fwd {animation:flip-in  180ms ease-out forwards;}
.card.out-rev{animation:flip-out-rev 180ms ease-in forwards;}
.card.in-rev {animation:flip-in-rev  180ms ease-out forwards;}

/* Done stamp */
.card.done-stamp::before{
content:‘✓ DONE’;position:absolute;top:12px;right:12px;z-index:50;
background:#3d9b4a;color:#fff;padding:3px 9px;border-radius:20px;
font-size:10px;font-weight:700;letter-spacing:1px;
font-family:‘Courier New’,monospace;
box-shadow:0 2px 8px rgba(61,155,74,.4);
}

/* ── Scrollable content inside card ── */
.card-scroll{
flex:1;
overflow-y:auto;
-webkit-overflow-scrolling:touch;
display:flex;flex-direction:column;
}
.card-scroll::-webkit-scrollbar{width:3px;}
.card-scroll::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:2px;}

/* ── Cover ── */
.cover{
flex:1;display:flex;flex-direction:column;
align-items:center;justify-content:center;text-align:center;
padding:32px 24px;
background:linear-gradient(160deg,#1d5259 0%,#0d3a40 100%);color:#fff;
}
.cover .super{font-family:‘Courier New’,monospace;font-size:11px;letter-spacing:2px;
color:rgba(255,255,255,.55);text-transform:uppercase;margin-bottom:18px;}
.cover h1{font-size:34px;font-weight:800;line-height:1.1;margin-bottom:10px;}
.cover .dates{font-size:13px;color:rgba(255,255,255,.65);margin-bottom:24px;}
.cover hr{border:none;border-top:1px solid rgba(255,255,255,.2);width:50%;margin:0 auto 18px;}
.cover .big-rule{font-size:18px;font-weight:700;margin-bottom:6px;}
.cover .mid-rule{font-size:13px;color:rgba(255,255,255,.7);margin-bottom:6px;}
.cover .ital{font-size:13px;font-style:italic;color:rgba(255,255,255,.5);}

/* ── How-to ── */
.how-to{padding:18px 15px 24px;}
.how-to .super{font-family:‘Courier New’,monospace;font-size:9px;letter-spacing:1.5px;
color:#1d6d72;text-transform:uppercase;margin-bottom:4px;}
.how-to h2{font-size:20px;font-weight:800;margin-bottom:3px;}
.how-to .sub{font-size:12px;color:var(–muted);font-style:italic;margin-bottom:12px;}
.rule{border-radius:8px;padding:10px 12px;margin-bottom:8px;border-left:5px solid #888;}
.rule .rule-title{font-size:13px;font-weight:700;margin-bottom:3px;}
.rule .rule-body{font-size:11.5px;line-height:1.5;color:#444;}
[data-dark] .rule .rule-body{color:#bbb;}
.rule.morning{background:#e0f4f5;border-left-color:#1d6d72;}
.rule.lunch{background:#fdf0dc;border-left-color:#b8842a;}
.rule.evening{background:#ede5f5;border-left-color:#5c3d7a;}
.rule.saturday{background:#e4f0e8;border-left-color:#3d6b52;}
.rule.sunday{background:#f5f0eb;border-left-color:#aaa;}
.rule.miss{background:#fce8eb;border-left-color:#9e3f4f;}
[data-dark] .rule.morning{background:#0f2b2e;}[data-dark] .rule.lunch{background:#211800;}
[data-dark] .rule.evening{background:#160d24;}[data-dark] .rule.saturday{background:#0c1a10;}
[data-dark] .rule.sunday{background:#1a1510;}[data-dark] .rule.miss{background:#200a0d;}

/* ── Resources ── */
.resources{padding:16px 15px 24px;}
.resources .super{font-family:‘Courier New’,monospace;font-size:9px;letter-spacing:1.5px;
color:#1d6d72;text-transform:uppercase;margin-bottom:4px;}
.resources h2{font-size:20px;font-weight:800;margin-bottom:4px;}
.resources .intro{font-size:12px;color:var(–muted);font-style:italic;margin-bottom:14px;}
.resources h3{font-size:13px;color:#1d6d72;font-weight:700;margin:14px 0 6px;
padding-bottom:3px;border-bottom:2px solid #1d6d72;}
.resources ul{list-style:none;padding:0;}
.resources li{font-size:11.5px;padding:3px 0 3px 14px;position:relative;line-height:1.5;}
.resources li::before{content:’•’;position:absolute;left:3px;color:#1d6d72;}

/* ── Day header ── */
.day-header{
padding:13px 15px 11px;
display:flex;justify-content:space-between;align-items:flex-start;
gap:8px;color:#fff;flex-shrink:0;
}
/* Phase colours applied via card class */
.p1 .day-header{background:#1d6d72;}
.p2 .day-header{background:#5c3d7a;}
.p3 .day-header{background:#b8842a;}
.p4 .day-header{background:#9e3f4f;}
.p5 .day-header{background:#2c3e50;}
.phase-label{font-size:9px;letter-spacing:1px;text-transform:uppercase;opacity:.85;
font-family:‘Courier New’,monospace;margin-bottom:3px;}
.day-date{font-size:22px;font-weight:800;line-height:1.1;margin-bottom:3px;}
.day-topic{font-size:12px;font-weight:600;line-height:1.35;}
.day-counter{font-size:9px;font-family:‘Courier New’,monospace;opacity:.85;
white-space:nowrap;padding-top:2px;flex-shrink:0;}

/* ── Tasks ── */
.tasks{flex:1;}
.task{display:flex;gap:10px;padding:11px 13px;border-bottom:1px solid var(–border);
border-left:5px solid #ccc;}
.task:last-of-type{border-bottom:none;}
.task-morning{background:#e0f4f5;border-left-color:#1d6d72;}
.task-lunch{background:#fdf0dc;border-left-color:#b8842a;}
.task-evening{background:#ede5f5;border-left-color:#5c3d7a;}
.task-mock{background:#fce8eb;border-left-color:#9e3f4f;}
.task-rest{background:#e4f0e8;border-left-color:#3d6b52;}
.task-plan{background:#deeaf5;border-left-color:#2c5f8a;}
.task-sun{background:#f5f0eb;border-left-color:#bbb;}
[data-dark] .task-morning{background:#0f2b2e;}[data-dark] .task-lunch{background:#211800;}
[data-dark] .task-evening{background:#160d24;}[data-dark] .task-mock{background:#200a0d;}
[data-dark] .task-rest{background:#0c1a10;}[data-dark] .task-plan{background:#081520;}
[data-dark] .task-sun{background:#1a1510;}

/* Checkboxes */
.checkbox{min-width:22px;width:22px;height:22px;border:2px solid rgba(0,0,0,.25);
border-radius:5px;background:rgba(255,255,255,.7);cursor:pointer;flex-shrink:0;
margin-top:1px;display:flex;align-items:center;justify-content:center;
transition:all .15s;-webkit-tap-highlight-color:transparent;user-select:none;}
[data-dark] .checkbox{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.2);}
.checkbox.ticked{background:#3d9b4a;border-color:#3d9b4a;}
.checkbox.ticked::after{content:‘✓’;font-size:14px;color:#fff;font-weight:800;}
.task-body{flex:1;min-width:0;}
.task-label{font-family:‘Courier New’,monospace;font-size:10px;font-weight:700;
letter-spacing:.4px;margin-bottom:3px;text-transform:uppercase;}
.task-morning .task-label{color:#1d6d72;}
.task-lunch .task-label{color:#b8842a;}
.task-evening .task-label{color:#5c3d7a;}
.task-mock .task-label{color:#9e3f4f;}
.task-rest .task-label{color:#3d6b52;}
.task-plan .task-label{color:#2c5f8a;}
.task-sun .task-label{color:#888;}
.task-resource{font-size:13px;font-weight:700;line-height:1.3;margin-bottom:3px;}
.task-action{font-size:12px;line-height:1.45;color:#444;}
[data-dark] .task-action{color:#bbb;}

/* Footer */
.day-footer{padding:7px 14px;font-family:‘Courier New’,monospace;
font-size:9px;color:var(–muted);text-align:center;border-top:1px solid var(–border);
flex-shrink:0;}

/* ── Nav arrows ── */
.nav{position:fixed;top:50%;transform:translateY(-50%);z-index:150;
width:36px;height:36px;border-radius:50%;border:1px solid var(–border);
background:rgba(255,255,255,.88);backdrop-filter:blur(8px);
-webkit-backdrop-filter:blur(8px);cursor:pointer;
display:flex;align-items:center;justify-content:center;
font-size:20px;color:var(–text);box-shadow:0 2px 8px rgba(0,0,0,.1);}
[data-dark] .nav{background:rgba(26,24,21,.88);}
.nav-prev{left:3px;}.nav-next{right:3px;}
.nav:disabled{opacity:.2;pointer-events:none;}
@media(max-width:420px){.nav{display:none;}}

/* ── Countdown ── */
.countdown{position:fixed;bottom:0;left:0;right:0;height:36px;
display:flex;align-items:center;justify-content:center;
background:var(–p4);color:#fff;
font-size:11px;font-family:‘Courier New’,monospace;letter-spacing:.4px;z-index:150;}

/* ── Contents panel ── */
.cont-overlay{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.55);
opacity:0;pointer-events:none;transition:opacity .2s;
display:flex;align-items:flex-end;}
.cont-overlay.open{opacity:1;pointer-events:all;}
.cont-panel{width:100%;max-height:78dvh;background:var(–card);border-radius:18px 18px 0 0;
display:flex;flex-direction:column;overflow:hidden;
transform:translateY(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);}
.cont-overlay.open .cont-panel{transform:translateY(0);}
.cont-head{padding:14px 18px 10px;display:flex;justify-content:space-between;
align-items:center;border-bottom:1px solid var(–border);flex-shrink:0;}
.cont-head h3{font-size:16px;font-weight:700;}
.cont-close{width:30px;height:30px;border:none;background:var(–border);
border-radius:50%;cursor:pointer;font-size:15px;color:var(–text);}
.cont-search{padding:8px 14px;border-bottom:1px solid var(–border);flex-shrink:0;}
.cont-search input{width:100%;padding:8px 12px;border:1.5px solid var(–border);
border-radius:8px;font-size:14px;background:var(–bg);color:var(–text);outline:none;}
.cont-search input:focus{border-color:#1d6d72;}
.cont-scroll{overflow-y:auto;flex:1;padding:10px 12px 24px;}
.week-group{margin-bottom:6px;}
.week-lbl{font-size:10px;font-family:‘Courier New’,monospace;color:var(–muted);
text-transform:uppercase;letter-spacing:1px;padding:6px 6px 3px;}
.day-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.day-chip{padding:5px 2px;border-radius:6px;border:none;cursor:pointer;
font-size:10px;font-weight:600;text-align:center;line-height:1.3;
background:var(–border);color:var(–text);-webkit-tap-highlight-color:transparent;}
.day-chip:active{transform:scale(.9);}
.day-chip.cur{outline:2px solid #1d6d72;outline-offset:1px;}
.day-chip.done{background:#3d9b4a !important;color:#fff;}
.day-chip.p1{background:rgba(29,109,114,.18);}
.day-chip.p2{background:rgba(92,61,122,.18);}
.day-chip.p3{background:rgba(184,132,42,.18);}
.day-chip.p4{background:rgba(158,63,79,.18);}
.day-chip.p5{background:rgba(44,62,80,.18);}
.guide-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.guide-chip{padding:7px 14px;border-radius:8px;border:none;cursor:pointer;
font-size:12px;font-weight:600;background:var(–border);color:var(–text);}

/* ── Toast ── */
.toast{position:fixed;bottom:48px;left:50%;transform:translateX(-50%) translateY(20px);
background:rgba(20,18,14,.92);color:#fff;padding:9px 18px;border-radius:24px;
font-size:13px;font-weight:500;z-index:500;pointer-events:none;
opacity:0;transition:all .25s;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
</style>

</head>

  <button class="bar-btn" id="btn-contents" title="Contents (c)">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>

    <div class="cont-scroll" id="cont-scroll"></div>

</div>
<div class="toast" id="toast"></div>

const TOTAL   = META.length;
const EXAM    = new Date(‘2026-10-05’);
const START   = new Date(‘2026-04-21’);

let cur=0, flipping=false, done={}, tasks={};

function save(){
try{
localStorage.setItem(‘pb3_cur’,  cur);
localStorage.setItem(‘pb3_done’, JSON.stringify(done));
localStorage.setItem(‘pb3_tasks’,JSON.stringify(tasks));
}catch(e){}
}
function load(){
try{
const c=localStorage.getItem(‘pb3_cur’);   if(c!=null) cur=parseInt(c)||0;
const d=localStorage.getItem(‘pb3_done’);  if(d) done=JSON.parse(d)||{};
const t=localStorage.getItem(‘pb3_tasks’); if(t) tasks=JSON.parse(t)||{};
}catch(e){}
}

const card     = document.getElementById(‘card’);
const progFill = document.getElementById(‘prog-fill’);
const titleDay = document.getElementById(‘title-day’);
const titleDt  = document.getElementById(‘title-date’);
const titlePh  = document.getElementById(‘title-phase’);
const countEl  = document.getElementById(‘countdown’);
const toastEl  = document.getElementById(‘toast’);
const contOver = document.getElementById(‘cont-overlay’);

function renderPage(idx){
card.innerHTML = `<div class="card-scroll">${CONTENT[idx]}</div>`;
const m = META[idx];
card.className = ‘card ’ + (m.phaseClass||’’);
if(done[idx] && m.type===‘day’) card.classList.add(‘done-stamp’);
card.querySelectorAll(’.checkbox’).forEach((cb,ti)=>{
const key=`${idx}-${ti}`;
if(tasks[key]) cb.classList.add(‘ticked’);
cb.addEventListener(‘click’,()=>{
tasks[key]=!tasks[key];
cb.classList.toggle(‘ticked’,tasks[key]);
const all=[…card.querySelectorAll(’.checkbox’)];
if(all.every(c=>c.classList.contains(‘ticked’))&&m.type===‘day’){
done[idx]=true; card.classList.add(‘done-stamp’); toast(‘Day complete! 🎉’);
} else if(!tasks[key]){ delete done[idx]; card.classList.remove(‘done-stamp’); }
updateBar(); save();
});
});
}

function flipTo(newIdx,dir){
if(flipping||newIdx===cur||newIdx<0||newIdx>=TOTAL)return;
flipping=true;
card.classList.add(dir>0?‘out-fwd’:‘out-rev’);
setTimeout(()=>{
card.classList.remove(‘out-fwd’,‘out-rev’);
cur=newIdx; renderPage(cur);
card.classList.add(dir>0?‘in-fwd’:‘in-rev’);
setTimeout(()=>{ card.classList.remove(‘in-fwd’,‘in-rev’); flipping=false; updateBar(); save(); },190);
},185);
}
const goNext=()=>flipTo(cur+1,1);
const goPrev=()=>flipTo(cur-1,-1);
const goTo  =(n)=>{ if(n!==cur) flipTo(n,n>cur?1:-1); };

function goToday(){
const diff=Math.floor((Date.now()-START.getTime())/86400000);
const p=Math.min(Math.max(diff,0),167)+3;
goTo(p); toast(‘Jumped to today’);
}

function updateBar(){
const m=META[cur];
const doneCt=Object.keys(done).filter(k=>META[k]&&META[k].type===‘day’).length;
const pct=Math.round(doneCt/168*100);
progFill.style.width=pct+’%’;
if(m.type===‘day’){
titleDay.textContent=m.counter||’’;
titleDt.textContent=m.label||’’;
titlePh.textContent=(m.phase||’’).replace(‘PHASE ‘,‘P’).replace(’ — ‘,’—’);
} else {
titleDay.textContent=m.type===‘cover’?‘MRCPsych Paper B’:m.label;
titleDt.textContent=’’;
titlePh.textContent=m.type===‘cover’?‘Daily Sheets’:’’;
}
document.getElementById(‘btn-prev’).disabled=cur<=0;
document.getElementById(‘btn-next’).disabled=cur>=TOTAL-1;
const dl=Math.ceil((EXAM-Date.now())/86400000);
countEl.textContent=dl>0
?`⏳ ${dl} days to exam · ${pct}% complete · ${doneCt}/168 days`
:dl===0?‘🎓 Exam day! Good luck!’:‘✅ Exam complete!’;
}

// Dark mode
(function(){
const s=localStorage.getItem(‘pb3_dark’);
const sys=window.matchMedia(’(prefers-color-scheme:dark)’).matches;
if(s!=null?s===‘1’:sys) document.documentElement.setAttribute(‘data-dark’,’’);
})();
document.getElementById(‘btn-dark’).onclick=()=>{
const on=document.documentElement.hasAttribute(‘data-dark’);
document.documentElement.toggleAttribute(‘data-dark’,!on);
localStorage.setItem(‘pb3_dark’,on?‘0’:‘1’);
};

// Contents
function buildContents(){
const scroll=document.getElementById(‘cont-scroll’);
scroll.innerHTML=’’;
const row=document.createElement(‘div’); row.className=‘guide-row’;
[{l:‘Cover’,i:0},{l:‘How to use’,i:1},{l:‘Resources’,i:2}].forEach(({l,i})=>{
const b=document.createElement(‘button’); b.className=‘guide-chip’; b.textContent=l;
b.onclick=()=>{goTo(i);closeContents();}; row.appendChild(b);
});
scroll.appendChild(row);
let week=1, days=[];
const flush=()=>{
if(!days.length)return;
const g=document.createElement(‘div’); g.className=‘week-group’;
const lbl=document.createElement(‘div’); lbl.className=‘week-lbl’;
lbl.textContent=‘Week ‘+week; g.appendChild(lbl);
const grid=document.createElement(‘div’); grid.className=‘day-grid’;
days.forEach(({m,gi})=>{
const b=document.createElement(‘button’);
b.className=‘day-chip ‘+(m.phaseClass||’’);
if(done[gi]) b.classList.add(‘done’);
if(gi===cur) b.classList.add(‘cur’);
const parts=m.label.split(’ ‘);
b.innerHTML=`<span>${parts[0]||''}<br>${parts[1]||''}</span>`;
b.title=m.topic; b.onclick=()=>{goTo(gi);closeContents();};
grid.appendChild(b);
});
g.appendChild(grid); scroll.appendChild(g);
week++; days=[];
};
META.slice(3).forEach((m,i)=>{
days.push({m,gi:i+3});
if(days.length===7) flush();
});
flush();
}
function openContents(){ buildContents(); contOver.classList.add(‘open’); }
function closeContents(){ contOver.classList.remove(‘open’); }
document.getElementById(‘btn-contents’).onclick=openContents;
document.getElementById(‘cont-close’).onclick=closeContents;
contOver.addEventListener(‘click’,e=>{ if(e.target===contOver) closeContents(); });
document.getElementById(‘cont-search’).addEventListener(‘input’,e=>{
const q=e.target.value.toLowerCase();
document.querySelectorAll(’.day-chip’).forEach(c=>{
c.style.display=(c.title.toLowerCase().includes(q)||c.textContent.toLowerCase().includes(q))?’’:‘none’;
});
document.querySelectorAll(’.week-group’).forEach(g=>{
g.style.display=[…g.querySelectorAll(’.day-chip’)].some(c=>c.style.display!==‘none’)?’’:‘none’;
});
});

// Touch swipe
let tx=0,ty=0,tm=false;
const stage=document.getElementById(‘stage’);
stage.addEventListener(‘touchstart’,e=>{ tx=e.touches[0].clientX; ty=e.touches[0].clientY; tm=false; },{passive:true});
stage.addEventListener(‘touchmove’, e=>{ if(Math.abs(e.touches[0].clientX-tx)>Math.abs(e.touches[0].clientY-ty)) tm=true; },{passive:true});
stage.addEventListener(‘touchend’, e=>{
if(!tm)return;
const dx=e.changedTouches[0].clientX-tx;
const dy=Math.abs(e.changedTouches[0].clientY-ty);
if(Math.abs(dx)<40||dy>Math.abs(dx))return;
dx<0?goNext():goPrev();
});

// Keyboard
document.addEventListener(‘keydown’,e=>{
if(e.target.tagName===‘INPUT’)return;
const k=e.key;
if(k===‘ArrowRight’||k===’ ‘)goNext();
else if(k===‘ArrowLeft’)goPrev();
else if(k===‘c’||k===‘C’)openContents();
else if(k===‘t’||k===‘T’)goToday();
else if(k===‘Escape’)closeContents();
else if(k===‘1’)card.querySelectorAll(’.checkbox’)[0]?.click();
else if(k===‘2’)card.querySelectorAll(’.checkbox’)[1]?.click();
else if(k===‘3’)card.querySelectorAll(’.checkbox’)[2]?.click();
});

document.getElementById(‘btn-prev’).onclick=goPrev;
document.getElementById(‘btn-next’).onclick=goNext;
document.getElementById(‘btn-today’).onclick=goToday;

let toastT;
function toast(msg){
toastEl.textContent=msg; toastEl.classList.add(‘show’);
clearTimeout(toastT);
toastT=setTimeout(()=>toastEl.classList.remove(‘show’),2400);
}

// Boot
load();
renderPage(cur);
updateBar();

</script>
</body>
</html>
